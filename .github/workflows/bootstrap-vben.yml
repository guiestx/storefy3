name: Bootstrap Vben Admin

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/bootstrap-vben.yml

permissions:
  contents: write

jobs:
  bootstrap:
    if: ${{ github.repository == 'guiestx/storefy3' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Storefy 3
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import official Vben Admin source
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/vbenjs/vue-vben-admin.git /tmp/vue-vben-admin
          git -C /tmp/vue-vben-admin checkout 0cd87c170f48e17e7d0bc98ed2623f61a2728971
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            /tmp/vue-vben-admin/ ./

      - name: Add Storefy environment template
        shell: bash
        run: |
          cat > apps/web-antd/.env.example <<'EOF'
          VITE_APP_TITLE=Storefy 3
          VITE_APP_NAMESPACE=storefy3
          VITE_GLOB_API_URL=/api
          VITE_SUPABASE_URL=https://YOUR_PROJECT.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY=YOUR_PUBLISHABLE_KEY
          EOF

          cat > STOREFY3.md <<'EOF'
          # Storefy 3

          Base oficial: Vben Admin 5.7.0, commit `0cd87c170f48e17e7d0bc98ed2623f61a2728971`.

          Aplicação principal: `apps/web-antd`.

          Próximos módulos Storefy:
          - autenticação Supabase
          - visão geral operacional
          - pedidos
          - produtos
          - estoque
          EOF

      - name: Commit imported source
        shell: bash
        run: |
          git config user.name "Storefy Bootstrap"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Repository already bootstrapped."
            exit 0
          fi
          git commit -m "chore: bootstrap Vben Admin 5.7.0 [skip ci]"
          git push origin HEAD:main
