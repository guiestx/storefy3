name: Validate Storefy 3

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies and refresh lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Persist lockfile update
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "Storefy CI"
          git config user.email "actions@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh pnpm lockfile [skip ci]"
          git push origin HEAD:main

      - name: Typecheck Vben application
        run: pnpm -F @vben/web-antd typecheck

      - name: Build Vben application
        run: pnpm build:antd

      - name: Record validation result
        if: always()
        shell: bash
        env:
          BUILD_STATUS: ${{ job.status }}
          SOURCE_SHA: ${{ github.sha }}
          WORKFLOW_RUN: ${{ github.run_id }}
        run: |
          git config user.name "Storefy CI"
          git config user.email "actions@users.noreply.github.com"
          cat > .github/STOREIFY_BUILD_STATUS.md <<EOF
          # Storefy 3 build status

          - Status: ${BUILD_STATUS}
          - Source commit: ${SOURCE_SHA}
          - Workflow run: ${WORKFLOW_RUN}
          EOF
          git add .github/STOREIFY_BUILD_STATUS.md
          git commit -m "ci: record Storefy build ${BUILD_STATUS} [skip ci]" || exit 0
          git push origin HEAD:main
